<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-page h1 {
      margin-bottom: 2.5rem;
    }

    .contact-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 900px;
      width: 100%;
    }

    .contact-left {
      background: #1a1a2e;
      border-radius: 20px;
      padding: 36px 32px;
    }

    .contact-left h2 {
      color: #ffffff;
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 0 28px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .contact-item .c-icon {
      font-size: 1.4rem;
      width: 28px;
      text-align: center;
    }

    .contact-item .c-text {
      font-size: 1rem;
      color: #cccccc;
    }

    .contact-right {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .social-card {
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.15s, box-shadow 0.15s;
      flex: 1;
    }

    .social-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .social-card .s-icon {
      font-size: 2rem;
    }

    .social-card .s-label {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 4px;
    }

    .social-card .s-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #185FA5;
    }

    @media (max-width: 650px) {
      .contact-wrapper {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
